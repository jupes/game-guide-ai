server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # proxy API calls to the service container
    location /chat {
        proxy_pass         http://service:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /healthz {
        proxy_pass         http://service:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /metrics {
        proxy_pass         http://service:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # History + attachments (keep in sync with the Vite dev proxy list).
    # client_max_body_size: attachment uploads are base64 JSON — a 2 MB file
    # (the service's decoded cap) is ~2.7 MB on the wire; nginx's 1 MB default
    # would 413 it before the service could apply its own limit.
    location /conversations {
        proxy_pass           http://service:8000;
        proxy_http_version   1.1;
        proxy_set_header     Host $host;
        proxy_set_header     X-Real-IP $remote_addr;
        proxy_read_timeout   120s;
        client_max_body_size 4m;
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
