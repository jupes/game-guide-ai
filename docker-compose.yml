# RAG Chat — full local stack
# Prereq: .env must contain OPENAI_API_KEY (the DB already holds the vectors)
#
# docker compose up          → builds images + starts all three services
# docker compose up -d       → detached
# docker compose up vector-db → DB only (for local dev with uv-run service)
#
# Images: https://hub.docker.com/r/pgvector/pgvector
#         https://hub.docker.com/r/oven/bun   (UI build stage)
#         https://hub.docker.com/_/nginx       (UI serve stage)

services:
  vector-db:
    image: pgvector/pgvector:pg17-bookworm
    container_name: game-guide-ai-vector-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_dev_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-game_guide_ai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./vector-db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  service:
    build:
      context: .
      dockerfile: Dockerfile.service
    container_name: game-guide-ai-service
    env_file: .env          # loads OPENAI_API_KEY
    environment:
      # Override localhost default — service connects to the DB container by name
      DATABASE_URL: postgresql://${POSTGRES_USER:-rag}:${POSTGRES_PASSWORD:-rag_dev_change_me}@vector-db:5432/${POSTGRES_DB:-game_guide_ai}
    ports:
      - "8000:8000"
    depends_on:
      vector-db:
        condition: service_healthy
    # `ready` goes true once the RagService (corpus vocabulary) is built —
    # gives `docker compose up --wait` / scripts/up.sh a real readiness signal
    # (previously only the DB had a healthcheck, so --wait proved nothing).
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json,sys,urllib.request; b=json.load(urllib.request.urlopen('http://localhost:8000/healthz', timeout=3)); sys.exit(0 if b.get('ready') is True else 1)",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  ui:
    build:
      context: ./ui         # Dockerfile + nginx.conf live in ui/
    container_name: game-guide-ai-ui
    ports:
      - "5173:80"           # same port as the Vite dev server for muscle memory
    depends_on:
      - service

volumes:
  pgvector_data:
